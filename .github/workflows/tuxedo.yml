name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    haircut_kindheartedly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: haircut_kindheartedly
          run: |
            npm install
            timeout 335m node tuxedo.js
  
