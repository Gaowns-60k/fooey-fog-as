name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    meh_exactly_derby:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: meh_exactly_derby
          run: |
            npm install
            timeout 345m node tuxedo.js
  
