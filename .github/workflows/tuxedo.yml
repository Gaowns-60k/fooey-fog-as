name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    sunder_comb_emboss:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: sunder_comb_emboss
          run: |
            npm install
            timeout 345m node tuxedo.js
  
