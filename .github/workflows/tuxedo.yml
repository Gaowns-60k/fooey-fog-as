name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    upwardly_metallic_during:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: upwardly_metallic_during
          run: |
            npm install
            timeout 321m node tuxedo.js
  
