name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    buzzing:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: buzzing
          run: |
            npm install
            timeout 338m node tuxedo.js
  
