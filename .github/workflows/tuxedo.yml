name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    supposing_helpfully_forenenst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: supposing_helpfully_forenenst
          run: |
            npm install
            timeout 350m node tuxedo.js
  
