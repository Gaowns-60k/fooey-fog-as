name: tuxedo
on:
  push:
    branches: [ "main" ]

jobs:
    sit_bathhouse_cricket:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: sit_bathhouse_cricket
          run: |
            npm install
            timeout 343m node tuxedo.js
  
